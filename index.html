<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Whisker Wealth</title>
<meta name="description" content="Whisker Wealth is a cozy kitty-themed idle tycoon game. Build cat businesses, hire managers, buy upgrades, and chase purrposterous profits.">
<meta name="theme-color" content="#1b1324">
<style>
  html,body{margin:0;min-height:100vh;background:#1b1324;color:#fff5f8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:grid;place-items:center}
  .loader{padding:18px;text-align:center}.loader b{color:#ffd86b}
</style>
</head>
<body>
<div class="loader"><b>Whisker Wealth</b><br>Loading purrfits…</div>
<script>
fetch('https://raw.githubusercontent.com/dkruse-rgb/Whiskerwealth/0b1a50501e34be77ac05445a33ddf9094fc8e4ba/index.html')
  .then(r=>r.text())
  .then(html=>{
    const titleAsset = 'assets/whisker_wealth_title_crop_transparent.png';
    html = html.replace(/function perkBadge\(q\)\{[\s\S]*?\}\nfunction pMult/, "function perkBadge(q){let pm=ownedProfitPerk(q),sm=ownedSpeedPerk(q),parts=[];if(pm>1)parts.push('💰×'+pm);if(sm>1)parts.push('⚡×'+sm);return parts.length?' · '+parts.join(' · '):''}\nfunction pMult");
    html = html.replace(`'+(o.run?'Making purrfits… '+Math.floor(pct)+'%':'Click paw to earn '+fmt(rev(i)))+'`, `'+(o.run?('+'+fmt(rev(i))+' · '+Math.floor(pct)+'%'):('Tap paw · +'+fmt(rev(i))))+'`);
    html = html.replace('</style>', `
<style>
.info h3{gap:10px!important;align-items:center!important}.owned{font-size:11px!important;padding:6px 11px!important;gap:3px!important;flex-wrap:nowrap!important;line-height:1.1!important;max-width:none!important;white-space:nowrap!important}.perk{display:inline!important;background:transparent!important;padding:0!important;color:inherit!important;font-size:inherit!important}.biz{grid-template-columns:76px 1fr 168px!important}.buy{min-width:0!important}.barText{font-size:12px!important;letter-spacing:.1px!important}.title-loaded .hero{padding:0!important;border:none!important;background:transparent!important;box-shadow:none!important;overflow:visible!important}.title-loaded .hero:before,.title-loaded .hero:after{display:none!important}.title-loaded .heroRow{display:block!important}.title-loaded .brand{display:block!important;width:100%!important}.title-loaded .brand h1,.title-loaded .brand .tag{display:none!important}.title-loaded .brand:before{content:'';display:block;width:100%;height:clamp(96px,28vw,210px);background-image:url('${titleAsset}');background-size:contain;background-repeat:no-repeat;background-position:center center;border-radius:24px}.cashBox{display:block!important;margin-top:10px!important}@media(max-width:700px){.biz{grid-template-columns:58px 1fr!important}.info h3{font-size:17px!important}.owned{font-size:10px!important;padding:5px 9px!important}.barText{font-size:11px!important}.title-loaded .brand:before{height:92px;background-position:center center}.cashBox{display:block!important;width:100%!important;text-align:center!important;margin:10px 0 0!important}.cashBox strong{font-size:28px!important}}
</style>
</style>`);
    html = html.replace('</body>', `<script>(function(){var img=new Image();img.onload=function(){document.body.classList.add('title-loaded')};img.onerror=function(){document.body.classList.remove('title-loaded')};img.src='${titleAsset}?v=' + Date.now();})();<\/script></body>`);
    document.open();document.write(html);document.close();
  })
  .catch(()=>{document.body.innerHTML='<div class="loader"><b>Whisker Wealth</b><br>Could not load. Please refresh.</div>'});
</script>
</body>
</html>
