<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Whisker Wealth</title>
<meta name="description" content="Whisker Wealth is a cozy kitty-themed idle tycoon game. Build cat businesses, hire managers, buy upgrades, and chase purrposterous profits.">
<meta name="theme-color" content="#1b1324">
<style>
  html,body{margin:0;min-height:100vh;background:#1b1324;color:#fff5f8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:grid;place-items:center}
  .loader{padding:18px;text-align:center}.loader b{color:#ffd86b}
</style>
</head>
<body>
<div class="loader"><b>Whisker Wealth</b><br>Loading purrfits…</div>
<script>
fetch('https://raw.githubusercontent.com/dkruse-rgb/Whiskerwealth/0b1a50501e34be77ac05445a33ddf9094fc8e4ba/index.html')
  .then(r=>r.text())
  .then(html=>{
    const titleAsset = 'assets/whisker_wealth_smooth.png';
    html = html.replace(/function perkBadge\(q\)\{[\s\S]*?\}\nfunction pMult/, "function perkBadge(q){let pm=ownedProfitPerk(q),sm=ownedSpeedPerk(q),parts=[];if(pm>1)parts.push('💰×'+pm);if(sm>1)parts.push('⚡×'+sm);return parts.length?' · '+parts.join(' · '):''}\nfunction pMult");
    html = html.replace(`'+(o.run?'Making purrfits… '+Math.floor(pct)+'%':'Click paw to earn '+fmt(rev(i)))+'`, `'+(o.run?('+'+fmt(rev(i))+' · '+Math.floor(pct)+'%'):('Tap paw · +'+fmt(rev(i))))+'`);
    html = html.replace('</style>', `
<style>
.info h3{gap:10px!important;align-items:center!important}.owned{font-size:11px!important;padding:6px 11px!important;gap:3px!important;flex-wrap:nowrap!important;line-height:1.1!important;max-width:none!important;white-space:nowrap!important}.perk{display:inline!important;background:transparent!important;padding:0!important;color:inherit!important;font-size:inherit!important}.biz{grid-template-columns:76px 1fr 168px!important}.buy{min-width:0!important}.barText{font-size:12px!important;letter-spacing:.1px!important}.title-loaded .hero{padding:0!important;border:none!important;background:transparent!important;box-shadow:none!important;overflow:visible!important}.title-loaded .hero:before,.title-loaded .hero:after{display:none!important}.title-loaded .heroRow{display:block!important}.title-loaded .brand{display:block!important;width:100%!important}.title-loaded .brand h1,.title-loaded .brand .tag{display:none!important}.title-loaded .brand:before{content:'';display:block;width:100%;height:clamp(96px,28vw,210px);background-image:url('${titleAsset}');background-size:contain;background-repeat:no-repeat;background-position:center center;border-radius:24px}.cashBox{display:block!important;margin-top:10px!important}.patron-menu{display:grid!important;grid-template-columns:1fr 1fr!important;gap:12px!important}.patron-menu .card{grid-template-columns:1fr!important}.patron-menu .btn{width:100%!important;margin-top:10px!important}.patron-grid{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))!important;gap:12px!important}.patron-pill{display:inline-flex!important;gap:6px!important;align-items:center!important;border-radius:999px!important;background:#2a1830!important;color:#ffd86b!important;padding:5px 10px!important;font-weight:950!important;font-size:12px!important;margin:0 6px 10px 0!important}.patron-small{display:block!important;margin-top:4px!important;opacity:.78!important}@media(max-width:700px){.biz{grid-template-columns:58px 1fr!important}.info h3{font-size:17px!important}.owned{font-size:10px!important;padding:5px 9px!important}.barText{font-size:11px!important}.title-loaded .brand:before{height:92px;background-position:center center}.cashBox{display:block!important;width:100%!important;text-align:center!important;margin:10px 0 0!important}.cashBox strong{font-size:28px!important}.patron-menu{grid-template-columns:1fr!important}}
</style>
</style>`);
    html = html.replace('</body>', `<script>
(function(){
  var img=new Image();
  img.onload=function(){document.body.classList.add('title-loaded')};
  img.onerror=function(){document.body.classList.remove('title-loaded')};
  img.src='${titleAsset}?v=' + Date.now();
})();

(function(){
  var SHOP=[
    {id:'profit',icon:'💰',name:'Fatter Purrfits',desc:'+10% profit for every business per level.',base:25,scale:1.42,max:50},
    {id:'speed',icon:'⚡',name:'Faster Zoomies',desc:'+5% production speed for every business per level.',base:40,scale:1.46,max:40},
    {id:'stash',icon:'🎁',name:'Starting Stash',desc:'Begin each new life with +$250 per level.',base:15,scale:1.38,max:60},
    {id:'discount',icon:'👔',name:'Manager Discounts',desc:'Managers cost 3% less per level, up to 60%.',base:35,scale:1.55,max:20},
    {id:'patrons',icon:'🐾',name:'Bigger Fan Club',desc:'+10% more Patrons when you cash out per level.',base:60,scale:1.62,max:30},
    {id:'auto',icon:'🤖',name:'Auto-Cat Staff',desc:'Automatically manages your first businesses after each new life.',base:100,scale:2.15,max:5}
  ];
  function ensure(){state.pu=state.pu||{};state.patronSpent=state.patronSpent||0;state.lifetimePatrons=state.lifetimePatrons||((state.patrons||0)+state.patronSpent);SHOP.forEach(function(u){state.pu[u.id]=Math.max(0,Math.min(u.max,state.pu[u.id]||0));});}
  function lvl(id){ensure();return state.pu[id]||0;}
  function scost(u){return Math.max(1,Math.floor(u.base*Math.pow(u.scale,lvl(u.id))));}
  function disc(){return Math.min(.60,lvl('discount')*.03);}
  function pgain(){return 1+lvl('patrons')*.10;}
  function stash(){return lvl('stash')*250;}
  function lifetime(){ensure();return state.lifetimePatrons||state.patrons||0;}
  function auto(){ensure();var n=lvl('auto');for(var i=0;i<n&&i<state.b.length;i++){state.b[i].man=true;if(state.b[i].q)run(i);}}
  var oldFresh=fresh;
  fresh=function(){var f=oldFresh();if(typeof state!=='undefined'){f.pu=JSON.parse(JSON.stringify(state.pu||{}));f.patronSpent=state.patronSpent||0;f.lifetimePatrons=state.lifetimePatrons||((state.patrons||0)+(state.patronSpent||0));f.cash+=stash();}else{f.pu={};f.patronSpent=0;f.lifetimePatrons=0;}return f;};
  pMult=function(id){ensure();var q=state.b[id].q,m=1;[25,50,100,200,300,400].forEach(function(t){if(q>=t)m*=2});UP.forEach(function(u){if(state.up[u.id]&&((u.target===id&&u.type==='profit')||u.target===-1))m*=u.mult});m*=1+(lifetime()*.02);m*=1+(lvl('profit')*.10);return m;};
  sMult=function(id){ensure();var q=state.b[id].q,m=1;[50,200].forEach(function(t){if(q>=t)m*=2});UP.forEach(function(u){if(state.up[u.id]&&u.target===id&&u.type==='speed')m*=u.mult});m*=1+(lvl('speed')*.05);return m;};
  openManagers=function(){ensure();modalTitle.textContent='Managers';modalBody.innerHTML='<div class="patron-pill">👔 Discount: '+Math.round(disc()*100)+'%</div>';DATA.forEach(function(b,i){var o=state.b[i],price=Math.max(1,Math.floor(b.m*(1-disc()))),card=document.createElement('div');card.className='card'+(o.man?' done':'')+(state.cash<price&&!o.man?' locked':'');card.innerHTML='<div><b>👔 '+b.mn+'</b><br><small>Automatically runs '+b.n+'</small><small class="patron-small">Base: '+fmt(b.m)+' · Current: '+fmt(price)+'</small></div>';var btn=document.createElement('button');btn.className='btn';btn.textContent=o.man?'Hired':fmt(price);btn.disabled=o.man||state.cash<price;if(!o.man)btn.onclick=function(){state.cash-=price;o.man=true;run(i);pop('Manager hired.');openManagers();render();};card.appendChild(btn);modalBody.appendChild(card);});modal.classList.add('show');};
  function potential(){ensure();return Math.floor(Math.floor(Math.sqrt(state.total/1000000))*pgain());}
  function cashOut(gain){if(gain<1)return pop('Need more purrfits before a new life.');ensure();var pu=JSON.parse(JSON.stringify(state.pu||{})),spent=state.patronSpent||0,unspent=state.patrons||0,life=state.lifetimePatrons||(unspent+spent);state=fresh();state.pu=pu;state.patronSpent=spent;state.patrons=unspent+gain;state.lifetimePatrons=life+gain;auto();save();modal.classList.remove('show');pop('New life gained '+gain.toLocaleString()+' Patrons.');render();}
  openPatronShop=function(){ensure();modalTitle.textContent='Patron Shop';modalBody.innerHTML='<div class="patron-pill">🐾 Unspent Patrons: '+(state.patrons||0).toLocaleString()+'</div><div class="patron-pill">⭐ Lifetime Patrons: '+(state.lifetimePatrons||0).toLocaleString()+'</div>';var grid=document.createElement('div');grid.className='patron-grid';SHOP.forEach(function(u){var level=lvl(u.id),maxed=level>=u.max,cost=maxed?0:scost(u),card=document.createElement('div');card.className='card'+(maxed?' done':'')+(!maxed&&(state.patrons||0)<cost?' locked':'');card.innerHTML='<div><b>'+u.icon+' '+u.name+'</b><br><small>'+u.desc+'</small><small class="patron-small">Level '+level+' / '+u.max+'</small></div>';var btn=document.createElement('button');btn.className='btn';btn.textContent=maxed?'Maxed':'🐾 '+cost.toLocaleString();btn.disabled=maxed||(state.patrons||0)<cost;if(!maxed)btn.onclick=function(){ensure();if((state.patrons||0)<cost)return;state.patrons-=cost;state.patronSpent=(state.patronSpent||0)+cost;state.pu[u.id]=lvl(u.id)+1;auto();save();pop(u.name+' upgraded.');openPatronShop();render();};card.appendChild(btn);grid.appendChild(card);});modalBody.appendChild(grid);var back=document.createElement('button');back.className='btn ghost';back.textContent='Back to Nine Lives';back.onclick=openPrestige;modalBody.appendChild(back);modal.classList.add('show');};
  openPrestige=function(){ensure();var gain=potential();modalTitle.textContent='Nine Lives';modalBody.innerHTML='';var wrap=document.createElement('div');wrap.className='patron-menu';wrap.innerHTML='<div class="card"><div><b>🐾 Cash Out</b><br><small>Restart businesses and cash, but gain permanent Patrons.</small><small class="patron-small">Potential Patrons: <b>'+gain.toLocaleString()+'</b></small><small class="patron-small">Current bonus: +'+Math.round((pgain()-1)*100)+'% Patron gain</small></div><button class="btn danger" id="cashOutBtn" '+(gain<1?'disabled':'')+'>Begin New Life</button></div><div class="card"><div><b>🛍️ Patron Shop</b><br><small>Spend unspent Patrons on permanent upgrades. Spending does not lower your lifetime Patron bonus.</small><small class="patron-small">Unspent: <b>'+(state.patrons||0).toLocaleString()+'</b> · Lifetime: <b>'+(state.lifetimePatrons||0).toLocaleString()+'</b></small></div><button class="btn" id="patronShopBtn">Open Shop</button></div>';modalBody.appendChild(wrap);modal.classList.add('show');document.getElementById('cashOutBtn').onclick=function(){cashOut(gain);};document.getElementById('patronShopBtn').onclick=openPatronShop;};
  var oldRender=render;render=function(){ensure();auto();oldRender();};
  ensure();auto();prestigeBtn.onclick=openPrestige;save();render();
})();
<\/script></body>`);
    document.open();document.write(html);document.close();
  })
  .catch(()=>{document.body.innerHTML='<div class="loader"><b>Whisker Wealth</b><br>Could not load. Please refresh.</div>'});
</script>
</body>
</html>
